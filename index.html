<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="window-wrapper">
    <div class="app-layout">
      <div class="app-headbar">
        <div class="app-title">Interview Assistant</div>
        <div class="app-headbar-actions">
          <button
            class="app-settings-btn"
            id="openHotkeySettingsBtn"
            type="button"
            data-protected-tooltip="Settings"
            aria-label="Settings"
            aria-expanded="false"
          >
            <svg class="app-headbar-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z"></path>
              <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.05.05a2.2 2.2 0 0 1-3.11 3.11l-.05-.05a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.08 1.65V21.5a2.2 2.2 0 0 1-4.4 0v-.12a1.8 1.8 0 0 0-1.08-1.65 1.8 1.8 0 0 0-1.98.36l-.05.05a2.2 2.2 0 0 1-3.11-3.11l.05-.05A1.8 1.8 0 0 0 4.6 15a1.8 1.8 0 0 0-1.65-1.08H2.83a2.2 2.2 0 0 1 0-4.4h.12A1.8 1.8 0 0 0 4.6 8.44a1.8 1.8 0 0 0-.36-1.98l-.05-.05A2.2 2.2 0 0 1 7.3 3.3l.05.05a1.8 1.8 0 0 0 1.98.36 1.8 1.8 0 0 0 1.08-1.65V1.94a2.2 2.2 0 0 1 4.4 0v.12a1.8 1.8 0 0 0 1.08 1.65 1.8 1.8 0 0 0 1.98-.36l.05-.05a2.2 2.2 0 0 1 3.11 3.11l-.05.05a1.8 1.8 0 0 0-.36 1.98 1.8 1.8 0 0 0 1.65 1.08h.12a2.2 2.2 0 0 1 0 4.4h-.12A1.8 1.8 0 0 0 19.4 15Z"></path>
            </svg>
          </button>
          <button
            class="app-close-btn"
            id="closeAppBtn"
            type="button"
            data-protected-tooltip="Close"
            aria-label="Close app"
          >
            <svg class="app-headbar-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6l12 12"></path>
              <path d="M18 6L6 18"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="browser-container">
        <div class="left-panel">
          <div class="transcript-panel">
            <div class="transcript-header">
              <div class="transcript-heading">
                <div class="transcript-title-row">
                  <span>Transcript</span>
                  <span
                    class="transcript-source-pill"
                    id="transcriptSourcePill"
                    aria-live="polite"
                  >Live Captions - Waiting</span>
                </div>
                <div class="deepgram-usage-status" id="deepgramUsageStatus" hidden>
                  <span id="deepgramRemainingUsageValue">Remaining unavailable</span>
                </div>
              </div>
              <div class="transcript-actions">
                <button
                  class="transcript-action-btn transcript-icon-btn"
                  id="toggleLiveCaptionsBtn"
                  type="button"
                  data-protected-tooltip="Hide Live Captions window"
                  aria-label="Hide Live Captions window"
                >
                  <svg class="transcript-icon transcript-icon-visible transcript-icon-live-visible" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 12s3.75-6 10-6 10 6 10 6-3.75 6-10 6-10-6-10-6Z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                  <svg class="transcript-icon transcript-icon-hidden transcript-icon-live-hidden" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 3l18 18"></path>
                    <path d="M10.6 6.1A11.3 11.3 0 0 1 12 6c6.25 0 10 6 10 6a18.4 18.4 0 0 1-4.09 4.53"></path>
                    <path d="M6.53 6.52A18.16 18.16 0 0 0 2 12s3.75 6 10 6c1.64 0 3.11-.41 4.41-1.02"></path>
                    <path d="M9.88 9.88A3 3 0 0 0 12 15a2.98 2.98 0 0 0 2.12-.88"></path>
                  </svg>
                  <svg class="transcript-icon transcript-icon-deepgram-play" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 5v14l11-7Z"></path>
                  </svg>
                  <svg class="transcript-icon transcript-icon-deepgram-stop" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="7" y="7" width="10" height="10" rx="1.5"></rect>
                  </svg>
                </button>
                <button
                  class="transcript-action-btn transcript-icon-btn is-hidden-state is-translation-disabled"
                  id="toggleTranslationBtn"
                  type="button"
                  data-protected-tooltip="Enable translation in settings"
                  aria-label="Enable translation in settings"
                  aria-disabled="true"
                  aria-pressed="false"
                  disabled
                >
                  <svg class="transcript-icon transcript-icon-visible" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="4" y="5" width="16" height="14" rx="1.5"></rect>
                    <path d="M12 5v14"></path>
                    <path d="M15 9h2"></path>
                    <path d="M15 13h2"></path>
                  </svg>
                  <svg class="transcript-icon transcript-icon-hidden" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="4" y="5" width="16" height="14" rx="1.5"></rect>
                    <path d="M12 5v14"></path>
                    <path d="M3 3l18 18"></path>
                  </svg>
                </button>
                <button
                  class="transcript-action-btn transcript-icon-btn"
                  id="saveTranscriptBtn"
                  type="button"
                  data-protected-tooltip="Save transcript as file"
                  aria-label="Save transcript as file"
                >
                  <svg class="transcript-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 3v10"></path>
                    <path d="M7 9l5 5 5-5"></path>
                    <path d="M5 20h14"></path>
                  </svg>
                </button>
                <button
                  class="transcript-action-btn transcript-icon-btn"
                  id="clearTranscriptBtn"
                  type="button"
                  data-protected-tooltip="Clear transcript and restart Live Captions"
                  aria-label="Clear transcript and restart Live Captions"
                >
                  <svg class="transcript-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 8a7 7 0 0 0-12-2"></path>
                    <path d="M7 4v4h4"></path>
                    <path d="M5 16a7 7 0 0 0 12 2"></path>
                    <path d="M17 20v-4h-4"></path>
                  </svg>
                </button>
              </div>
            </div>
            <p
              class="transcript-source-status"
              id="transcriptSourceStatus"
              role="status"
              aria-live="polite"
              aria-atomic="true"
              hidden
            ></p>
            <div class="transcript-content is-translation-hidden" id="transcript">
              <div
                class="transcript-empty-state"
                id="transcriptEmptyState"
                role="status"
                aria-live="polite"
              >
                <div class="transcript-empty-title" id="transcriptEmptyTitle">Listening for transcript...</div>
                <div class="transcript-empty-copy" id="transcriptEmptyCopy">Live Captions will appear here when speech is detected.</div>
              </div>
              <div class="transcript-rows" id="transcriptRows"></div>
            </div>
            <button
              class="new-transcript-indicator"
              id="newTranscriptIndicator"
              type="button"
              aria-label="Show latest transcript"
              hidden
            >
              New transcript below
            </button>
          </div>
        </div>
        <div
          class="panel-divider"
          id="panelDivider"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize panels"
          aria-valuemin="0"
          aria-valuemax="0"
          aria-valuenow="0"
          aria-valuetext="Transcript panel width"
          tabindex="0"
        ></div>

        <div class="right-panel">
        <div class="tab-bar" id="tabBar">
          <button
            class="new-tab-btn"
            id="newTabBtn"
            type="button"
            data-protected-tooltip="New Tab (Ctrl+T)"
            aria-label="New tab"
          >+</button>
        </div>

        <div class="url-bar-container">
          <div class="nav-buttons">
            <button
              class="nav-btn"
              id="backBtn"
              type="button"
              data-protected-tooltip="Back (Alt+Left)"
              aria-label="Back"
              disabled
            >
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M10 12L6 8l4-4v8z"/>
              </svg>
            </button>
            <button
              class="nav-btn"
              id="forwardBtn"
              type="button"
              data-protected-tooltip="Forward (Alt+Right)"
              aria-label="Forward"
              disabled
            >
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M6 12l4-4-4-4v8z"/>
              </svg>
            </button>
            <button
              class="nav-btn"
              id="reloadBtn"
              type="button"
              data-protected-tooltip="Reload (Ctrl+R)"
              aria-label="Reload"
            >
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M13.65 2.35C12.2 0.9 10.2 0 8 0S3.8 0.9 2.35 2.35C0.9 3.8 0 5.8 0 8s0.9 4.2 2.35 5.65C3.8 15.1 5.8 16 8 16s4.2-0.9 5.65-2.35C15.1 12.2 16 10.2 16 8s-0.9-4.2-2.35-5.65zM8 14c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/>
                <path d="M8 4v4l3 2"/>
              </svg>
            </button>
          </div>

          <div class="url-input-wrapper">
            <input
              type="text"
              class="url-input"
              id="urlInput"
              placeholder="Enter URL or search"
              spellcheck="false"
              aria-label="Address or search"
            />
            <div class="loading-indicator" id="loadingIndicator" style="display: none;"></div>
          </div>
        </div>

        <div class="content-area" id="contentArea">
          <!-- The main process positions the active WebContentsView over this area. -->
        </div>
        </div>
      </div>
      <div class="mode-panel is-collapsed">
        <div class="mode-header">
          <div class="mode-header-main">
            <span class="mode-header-title">Mode</span>
            <div class="mode-header-summary">
              <div class="mode-dropdown mode-dropdown-inline" id="collapsedModeDropdown">
                <button
                  class="mode-dropdown-toggle mode-dropdown-toggle-inline"
                  id="collapsedModeDropdownToggle"
                  type="button"
                  aria-haspopup="menu"
                  aria-expanded="false"
                >
                  <span id="collapsedModeDropdownLabel">Default</span>
                  <svg class="mode-dropdown-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 9l6 6 6-6"></path>
                  </svg>
                </button>
                <div class="mode-dropdown-menu" id="collapsedModeDropdownMenu" role="menu" aria-label="Prompt modes" aria-orientation="vertical" hidden></div>
              </div>
              <div class="mode-prompt-preview" id="modePromptPreview"></div>
            </div>
          </div>
          <button
            class="mode-toggle-btn"
            id="modeToggleBtn"
            type="button"
            data-protected-tooltip="Expand Mode panel"
            aria-label="Expand Mode panel"
            aria-expanded="false"
          >
            <svg class="mode-toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 9l6 6 6-6"></path>
            </svg>
          </button>
        </div>
        <div class="mode-content">
          <div class="mode-layout">
            <div class="mode-selector-pane">
              <div class="mode-field-label">Select Mode</div>
              <div class="mode-dropdown" id="modeDropdown">
                <button
                  class="mode-dropdown-toggle"
                  id="modeDropdownToggle"
                  type="button"
                  aria-haspopup="menu"
                  aria-expanded="false"
                >
                  <span id="modeDropdownLabel">Default</span>
                  <svg class="mode-dropdown-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 9l6 6 6-6"></path>
                  </svg>
                </button>
                <div class="mode-dropdown-menu" id="modeDropdownMenu" role="menu" aria-label="Prompt modes" aria-orientation="vertical" hidden></div>
              </div>
              <label class="mode-field-label mode-hotkey-label" for="modeHotkeyInput">Global Hotkey</label>
              <input
                class="mode-hotkey-input"
                id="modeHotkeyInput"
                type="text"
                placeholder="Press shortcut"
                spellcheck="false"
                autocomplete="off"
                readonly
                aria-describedby="modeHotkeyStatus"
              />
              <p class="mode-hotkey-status" id="modeHotkeyStatus" role="status" aria-live="polite">
                Press a shortcut to set a global hotkey.
              </p>
            </div>
            <div class="mode-editor-pane">
              <label class="mode-field-label" for="modeSuffixInput">Prompt</label>
              <div class="mode-editor-row">
                <textarea
                  class="mode-suffix-input"
                  id="modeSuffixInput"
                  placeholder="Enter the prompt that should be appended after the transcript"
                  spellcheck="false"
                ></textarea>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="protected-tooltips.js"></script>
  <script src="src/hotkeyHelpers.js"></script>
  <script src="src/promptModeHelpers.js"></script>
  <script src="src/transcriptPrompt.js"></script>
  <script src="src/transcriptDisplayGroups.js"></script>
  <script src="src/deepgramCaptureController.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
