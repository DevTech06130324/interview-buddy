<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="hotkey-settings.css">
</head>
<body>
  <section
    class="hotkey-dialog"
    role="dialog"
    aria-modal="false"
    aria-labelledby="hotkeyDialogTitle"
  >
    <div class="hotkey-dialog-header">
      <div>
        <div class="hotkey-dialog-title" id="hotkeyDialogTitle">Settings</div>
        <div class="hotkey-dialog-subtitle">Manage transcript source, Deepgram, translation, and shortcuts.</div>
      </div>
      <button
        class="hotkey-dialog-close"
        id="closeHotkeyDialogBtn"
        type="button"
        data-protected-tooltip="Close settings"
        aria-label="Close settings"
      >
        <svg class="hotkey-dialog-close-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 6l12 12"></path>
          <path d="M18 6L6 18"></path>
        </svg>
      </button>
    </div>
    <section class="settings-section" aria-labelledby="transcriptSettingsTitle">
      <div class="settings-section-heading" id="transcriptSettingsTitle">Transcript</div>
      <div class="setting-row">
        <div class="setting-meta">
          <div class="setting-name">Translation</div>
          <div class="setting-description">Enable transcript translation.</div>
        </div>
        <label class="setting-switch">
          <input
            class="setting-switch-input"
            id="translationEnabledToggle"
            type="checkbox"
            aria-label="Enable transcript translation"
          >
          <span class="setting-switch-track" aria-hidden="true">
            <span class="setting-switch-thumb"></span>
          </span>
        </label>
      </div>
      <div class="setting-row">
        <div class="setting-meta">
          <div class="setting-name">Transcript source</div>
          <div class="setting-description">Choose Live Captions or Deepgram.</div>
        </div>
        <select
          class="setting-select"
          id="transcriptSourceSelect"
          aria-label="Transcript source"
        >
          <option value="live-captions">Live Captions</option>
          <option value="deepgram">Deepgram</option>
        </select>
      </div>
    </section>
    <section class="settings-section" aria-labelledby="deepgramSettingsTitle">
      <div class="settings-section-heading" id="deepgramSettingsTitle">Deepgram</div>
      <div class="setting-row setting-row-stacked">
        <div class="setting-meta">
          <div class="setting-name">Deepgram API key</div>
          <div class="setting-description">Saved locally and shown masked after saving.</div>
        </div>
        <div class="setting-inline-controls">
          <input
            class="setting-input"
            id="deepgramApiKeyInput"
            type="password"
            autocomplete="off"
            spellcheck="false"
            placeholder="Enter Deepgram API key"
            aria-label="Deepgram API key"
          >
          <button
            class="setting-button"
            id="saveDeepgramApiKeyBtn"
            type="button"
          >
            Save
          </button>
          <button
            class="setting-button"
            id="clearDeepgramApiKeyBtn"
            type="button"
          >
            Clear
          </button>
        </div>
      </div>
    </section>
    <section class="settings-section settings-section-shortcuts" aria-labelledby="shortcutSettingsTitle">
      <div class="settings-section-heading" id="shortcutSettingsTitle">Shortcuts</div>
      <div class="hotkey-list" id="hotkeyList"></div>
    </section>
  </section>

  <script src="protected-tooltips.js"></script>
  <script src="src/hotkeyHelpers.js"></script>
  <script src="hotkey-settings.js"></script>
</body>
</html>
