<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture Area</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      background: rgba(0, 0, 0, 0.18);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    body {
      position: relative;
    }

    #instructions {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.82);
      color: #f8fafc;
      font-size: 13px;
      letter-spacing: 0.01em;
      pointer-events: none;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    #selection {
      position: fixed;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.98);
      background: rgba(59, 130, 246, 0.16);
      box-shadow: 0 0 0 99999px rgba(0, 0, 0, 0.28);
      backdrop-filter: saturate(1.1);
    }
  </style>
</head>
<body>
  <div id="instructions">Drag to capture an area. Press Esc to cancel.</div>
  <div id="selection"></div>

  <script>
    const { ipcRenderer } = require('electron');

    const selectionEl = document.getElementById('selection');
    const MIN_SIZE = 8;
    let startPoint = null;
    let dragging = false;

    function cancelSelection() {
      ipcRenderer.send('screen-capture-overlay-cancel');
    }

    function normalizeRect(start, end) {
      return {
        x: Math.min(start.x, end.x),
        y: Math.min(start.y, end.y),
        width: Math.abs(end.x - start.x),
        height: Math.abs(end.y - start.y)
      };
    }

    function renderSelection(rect) {
      selectionEl.style.display = 'block';
      selectionEl.style.left = rect.x + 'px';
      selectionEl.style.top = rect.y + 'px';
      selectionEl.style.width = rect.width + 'px';
      selectionEl.style.height = rect.height + 'px';
    }

    function clearSelection() {
      selectionEl.style.display = 'none';
    }

    window.addEventListener('contextmenu', (event) => {
      event.preventDefault();
      cancelSelection();
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        event.preventDefault();
        cancelSelection();
      }
    });

    window.addEventListener('pointerdown', (event) => {
      if (event.button !== 0) {
        return;
      }

      dragging = true;
      startPoint = { x: event.clientX, y: event.clientY };
      renderSelection({ x: startPoint.x, y: startPoint.y, width: 0, height: 0 });
    });

    window.addEventListener('pointermove', (event) => {
      if (!dragging || !startPoint) {
        return;
      }

      renderSelection(normalizeRect(startPoint, { x: event.clientX, y: event.clientY }));
    });

    window.addEventListener('pointerup', (event) => {
      if (!dragging || !startPoint) {
        return;
      }

      dragging = false;
      const rect = normalizeRect(startPoint, { x: event.clientX, y: event.clientY });
      startPoint = null;

      if (rect.width < MIN_SIZE || rect.height < MIN_SIZE) {
        clearSelection();
        return;
      }

      ipcRenderer.send('screen-capture-overlay-select', rect);
    });
  </script>
</body>
</html>
